<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravelBloom</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav>
    <h1>TravelBloom</h1>

    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Contact Us</a>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter a destination...">
        <button id="toggleSearch">🔍</button>

        <div class="search-buttons">
            <button id="searchBtn">Search</button>
            <button id="resetBtn">Clear</button>
        </div>
    </div>
</nav>

<header class="home">

    <div class="social-icons">
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <div class="overlay">
        <h1>EXPLORE DREAM DESTINATION</h1>
        <p>
            Let your travel dreams bloom! Discover beautiful destinations, 
            explore cultures, and find the perfect getaway.
        </p>
    </div>

    <button id="bookBtn">Book Now</button>
</header>

<script src="travel_recommendation.js"></script>

</body>
</html>
